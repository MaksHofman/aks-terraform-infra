trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  TF_VERSION: '1.7.0'

stages:
- stage: Terraform
  jobs:
  - job: Apply
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - task: TerraformTaskV4@4
      displayName: init
      inputs:
        provider: azurerm
        command: init
        workingDirectory: $(System.DefaultWorkingDirectory)
        environmentServiceNameAzureRM: 'Azure-Service-Connection'

    - task: TerraformTaskV4@4
      displayName: plan
      inputs:
        provider: azurerm
        command: plan
        workingDirectory: $(System.DefaultWorkingDirectory)
        environmentServiceNameAzureRM: 'Azure-Service-Connection'

    - task: TerraformTaskV4@4
      displayName: apply
      inputs:
        provider: azurerm
        command: apply
        workingDirectory: $(System.DefaultWorkingDirectory)
        environmentServiceNameAzureRM: 'Azure-Service-Connection'